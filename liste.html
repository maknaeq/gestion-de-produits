<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liste de courses</title>
  </head>
  <body>

    <nav>
      <span><strong>Gestion de produits</strong></span>
      <a href="/index.html">Produits disponibles</a>
    </nav>

    <div class="container">
      <div class="list-header">
        <h2>Ma liste de course</h2>
        <button id="vider-liste">Vider la liste</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>Produit</th>
            <th>PU (€)</th>
            <th>Quantité</th>
            <th>Sous-total</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="liste-course-body"></tbody>
      </table>

      <div class="total-box">
        <div>Total général</div>
        <div id="total-general">0.00 €</div>
      </div>
    </div>

    <script type="module" src="/src/liste.js"></script>
  </body>
</html>
